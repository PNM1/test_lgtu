<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | MyApp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="forecast.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="menu-container">
                <button class="menu-btn" id="menuBtn">
                    <span class="menu-icon">☰</span>
                    <span>Меню</span>
                </button>
            </div>

            <div class="profile-section">
                <button class="profile-btn" id="profileBtn">
                    Профиль
                </button>
                <button class="settings-btn" id="settingsBtn">
                    Настройки
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section id="forecast-section" class="forecast-section" style="display: none;">
    
            <div class="forecast-container">
                <div class="forecast-controls">
                    <div class="herd-selector">
                        <label for="herd-select">Выберите стадо:</label>
                        <select id="herd-select" class="herd-select">
                            <option value="" disabled selected>— Выберите стадо —</option>
                            <option value="1">Заглушка</option>
                            <option value="2">Заглушка</option>
                            <option value="3">Заглушка</option>
                            <option value="4">Заглушка</option>
                        </select>
                    </div>
    
                    <div class="herd-search">
                        <label for="herd-search-input">Или введите номер/название:</label>
                        <div class="search-input-wrapper">
                            <input type="text" id="herd-search-input" class="herd-search-input" placeholder="Например: Стадо №1 или 1">
                            <button class="search-btn">Поиск</button>
                        </div>
                    </div>
                </div>
    
                <div class="forecast-chart">
                    <div class="chart-placeholder">
                        <div class="chart-text">График прогноза</div>
                        <div class="chart-mock">
                            
                        </div>
                    </div>
                </div>
    
                <div class="forecast-result">
                    <div class="result-header">
                        <h3>Результат прогноза</h3>
                        <span class="result-date">февраль 2026</span>
                    </div>
                    <div class="result-content">
                        <textarea class="result-textarea" readonly placeholder="Здесь появится результат прогноза...">Какой-то вывод</textarea>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="profileSidebar" class="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h2>Профиль</h2>
                <button class="close-sidebar" id="closeProfileSidebar">&times;</button>
            </div>
            
            <div class="profile-empty">
                <div class="profile-empty-icon">👤</div>
            </div>
        </div>
    </div>

    <div id="settingsSidebar" class="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h2>Настройки</h2>
                <button class="close-sidebar" id="closeSettings">&times;</button>
            </div>
            
            <div class="settings-content">
                <h3 style="color: var(--primary); margin-bottom: 1.5rem;">Выберите тему:</h3>
                
                <div class="theme-option" data-theme="default">
                    <span>Стандартная</span>
                </div>
                
                <div class="theme-option" data-theme="light">
                    <span>Светлая</span>
                </div>
                
                <div class="theme-option" data-theme="dark">
                    <span>Тёмная</span>
                </div>
            </div>
        </div>
    </div>

    <div id="menuSidebar" class="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h2>Меню</h2>
                <button class="close-sidebar" id="closeMenu">&times;</button>
            </div>
            
            <div class="menu-content">
                <div class="menu-item">прогноз</div>
                <div class="menu-item">история</div>
                <div class="menu-item-with-submenu">
                    <div class="menu-item main-item">коровы</div>
                    <div class="submenu">
                        <button class="submenu-btn">Найти</button>
                        <button class="submenu-btn">Редактировать</button>
                    </div>
                </div>
                <div class="menu-item-with-submenu">
                    <div class="menu-item main-item">стада</div>
                    <div class="submenu">
                        <button class="submenu-btn">Просмотреть</button>
                        <button class="submenu-btn">Редактировать</button>
                    </div>
                </div>
                <div class="menu-item-with-submenu">
                    <div class="menu-item main-item">пользователи</div>
                    <div class="submenu">
                        <button class="submenu-btn">Добавить</button>
                        <button class="submenu-btn">Редактировать</button>
                    </div>
                </div>
                <div class="menu-item">пользователи</div>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay"></div>

    <script src="settings.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
