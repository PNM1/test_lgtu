<!-- public/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прогнозирование дней доения</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success {
            background: #c6f6d5;
            color: #22543d;
        }
        .error {
            background: #fed7d7;
            color: #742a2a;
        }
        .warning {
            background: #feebc8;
            color: #7b341e;
        }
        .info {
            background: #bee3f8;
            color: #2c5282;
        }
        .results {
            margin-top: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f7fafc;
            font-weight: 600;
        }
        tr:hover {
            background: #f7fafc;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f7fafc;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #718096;
            margin-top: 5px;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐄 Прогнозирование средних дней доения</h1>

        <div class="nav-buttons">
            <button onclick="checkHealth()">🩺 Проверка сервера</button>
            <button onclick="getModelInfo()">📊 Информация о модели</button>
            <button onclick="loadExample()">📝 Загрузить пример</button>
            <button onclick="trainModel()">⚙️ Обучить модель</button>
        </div>

        <!-- Статус сервера -->
        <div id="healthStatus" class="card"></div>

        <!-- Форма прогноза -->
        <div class="card">
            <h2>Параметры прогноза</h2>
            <form id="predictionForm">
                <div class="form-group">
                    <label for="startDate">Начальная дата (ДД.ММ.ГГГГ):</label>
                    <input type="text" id="startDate" placeholder="01.03.2026" required>
                </div>
                <div class="form-group">
                    <label for="endDate">Конечная дата (ДД.ММ.ГГГГ):</label>
                    <input type="text" id="endDate" placeholder="28.02.2027" required>
                </div>
                <div class="form-group">
                    <label for="addCows">Добавить коров:</label>
                    <input type="number" id="addCows" value="10" min="0">
                </div>
                <div class="form-group">
                    <label for="removeCows">Удалить коров:</label>
                    <input type="number" id="removeCows" value="0" min="0">
                </div>
                <button type="submit">🚀 Запустить прогноз</button>
            </form>
        </div>

        <!-- Индикатор загрузки -->
        <div id="loader" class="loader" style="display: none;"></div>

        <!-- Результаты -->
        <div id="results" class="card" style="display: none;">
            <h2>Результаты прогноза</h2>
            <div id="stats" class="stats"></div>
            <div id="resultsTable" class="results"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                showHealthStatus(data);
            } catch (err) {
                showError('Ошибка подключения к серверу');
            }
        }

        async function getModelInfo() {
            try {
                const res = await fetch(`${API_BASE}/model/info`);
                const data = await res.json();
                if (data.success) {
                    let html = '<div class="status info">';
                    if (data.currentState) {
                        html += `
                            <h3>Текущее состояние стада:</h3>
                            <p>📅 Дата: ${data.currentState.date}</p>
                            <p>🐄 Всего коров: ${data.currentState.totalCows}</p>
                            <p>🥛 Дойных коров: ${data.currentState.lactatingCows}</p>
                            <p>📊 Средние дни доения: ${data.currentState.avgDaysInMilk}</p>
                        `;
                    } else {
                        html += '<p>Модель существует, но состояние не получено</p>';
                    }
                    html += '</div>';
                    showHealthStatus({ status: 'ok', ...data }, html);
                }
            } catch (err) {
                showError('Ошибка получения информации о модели');
            }
        }

        async function loadExample() {
            try {
                const res = await fetch(`${API_BASE}/example-input`);
                const data = await res.json();
                document.getElementById('startDate').value = data.start_date;
                document.getElementById('endDate').value = data.end_date;
                document.getElementById('addCows').value = data.changes.add;
                document.getElementById('removeCows').value = data.changes.remove;
                showMessage('Пример загружен', 'success');
            } catch (err) {
                showError('Ошибка загрузки примера');
            }
        }

        async function trainModel() {
            if (!confirm('Обучение модели может занять несколько минут. Продолжить?')) {
                return;
            }

            showLoader(true);
            try {
                const res = await fetch(`${API_BASE}/model/train`, {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Модель успешно обучена!', 'success');
                } else {
                    showError('Ошибка обучения: ' + data.error);
                }
            } catch (err) {
                showError('Ошибка обучения модели');
            } finally {
                showLoader(false);
            }
        }

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const addCows = parseInt(document.getElementById('addCows').value) || 0;
            const removeCows = parseInt(document.getElementById('removeCows').value) || 0;

            // Валидация
            if (!isValidDate(startDate) || !isValidDate(endDate)) {
                showError('Неверный формат даты. Используйте ДД.ММ.ГГГГ');
                return;
            }

            showLoader(true);
            hideResults();

            try {
                const response = await fetch(`${API_BASE}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        start_date: startDate,
                        end_date: endDate,
                        changes: {
                            add: addCows,
                            remove: removeCows
                        }
                    })
                });

                const data = await response.json();

                if (data.success) {
                    displayResults(data);
                } else {
                    showError(data.error || 'Ошибка выполнения прогноза');
                }
            } catch (err) {
                showError('Ошибка подключения к серверу');
                console.error(err);
            } finally {
                showLoader(false);
            }
        });

        function isValidDate(dateStr) {
            const regex = /^\d{2}\.\d{2}\.\d{4}$/;
            if (!regex.test(dateStr)) return false;
            
            const [day, month, year] = dateStr.split('.');
            const date = new Date(year, month - 1, day);
            return date.getDate() == day && date.getMonth() == month - 1 && date.getFullYear() == year;
        }

        function displayResults(data) {
            const results = data.data;
            const summary = data.summary;

            let statsHtml = `
                <div class="stat-card">
                    <div class="stat-value">${results.length}</div>
                    <div class="stat-label">Месяцев прогноза</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${summary.avgMean}</div>
                    <div class="stat-label">Среднее значение</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${summary.avgMin}</div>
                    <div class="stat-label">Минимум</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${summary.avgMax}</div>
                    <div class="stat-label">Максимум</div>
                </div>
            `;

            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>Месяц</th>
                            <th>Средние дни доения</th>
                            <th>Всего коров</th>
                            <th>Дойных коров</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            results.forEach(item => {
                tableHtml += `
                    <tr>
                        <td>${item.month}</td>
                        <td><strong>${item.avg_days_in_milk}</strong></td>
                        <td>${item.total_cows}</td>
                        <td>${item.lactating_cows}</td>
                    </tr>
                `;
            });

            tableHtml += '</tbody></table>';

            document.getElementById('stats').innerHTML = statsHtml;
            document.getElementById('resultsTable').innerHTML = tableHtml;
            document.getElementById('results').style.display = 'block';
        }

        function showHealthStatus(data, customHtml = null) {
            let html = '<div class="status ' + (data.status === 'ok' ? 'success' : 'error') + '">';
            if (customHtml) {
                html += customHtml;
            } else {
                html += `
                    <h3>Статус сервера: ✅ Работает</h3>
                    <p>Время: ${new Date(data.timestamp).toLocaleString()}</p>
                    <p>Модель: ${data.modelExists ? '✅ существует' : '❌ не найдена'}</p>
                    <p>Python скрипт: ${data.pythonScript ? '✅ доступен' : '❌ не найден'}</p>
                `;
            }
            html += '</div>';
            document.getElementById('healthStatus').innerHTML = html;
        }

        function showError(message) {
            document.getElementById('healthStatus').innerHTML = `
                <div class="status error">
                    ❌ ${message}
                </div>
            `;
        }

        function showMessage(message, type = 'info') {
            document.getElementById('healthStatus').innerHTML = `
                <div class="status ${type}">
                    ${message}
                </div>
            `;
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        function hideResults() {
            document.getElementById('results').style.display = 'none';
        }
        checkHealth();
    </script>
</body>
</html>
